<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>audio-visualizer — dev</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      /* ── Colour tokens ──────────────────────────────────────────────────── */
      :root {
        --bg:                #0f0f0f;
        --surface:           #141414;
        --inset:             #0a0a0a;
        --border:            #1e1e1e;
        --text:              #e5e5e5;
        --text-muted:        #555;
        --input-bg:          #1a1a1a;
        --input-border:      #2a2a2a;
        --input-hover:       #222;
        --input-hover-border:#333;
        --active-bg:         #1a1f3a;
        --active-border:     #3b40a0;
        --active-text:       #a5b4fc;
        --error:             #ef4444;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg:                #ebebeb;
          --surface:           #ffffff;
          --inset:             #f0f0f0;
          --border:            #e0e0e0;
          --text:              #1a1a1a;
          --text-muted:        #999;
          --input-bg:          #f8f8f8;
          --input-border:      #d0d0d0;
          --input-hover:       #f0f0f0;
          --input-hover-border:#bbb;
          --active-bg:         #eef2ff;
          --active-border:     #6366f1;
          --active-text:       #4338ca;
          --error:             #dc2626;
        }
      }

      /* ── Layout ─────────────────────────────────────────────────────────── */
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px;
        /* Wide enough to contain the xl component (384 px bars + label + padding) */
        width: min(620px, calc(100vw - 32px));
      }

      /* ── Mic controls ───────────────────────────────────────────────────── */
      .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      select {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text);
        font-size: 0.875rem;
        cursor: pointer;
      }

      .btn-row {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 10px 0;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text);
        font-size: 0.875rem;
        cursor: pointer;
        transition: background 120ms, border-color 120ms;
      }
      button:hover:not(:disabled) {
        background: var(--input-hover);
        border-color: var(--input-hover-border);
      }
      button:disabled { opacity: 0.35; cursor: not-allowed; }
      button.active {
        background: var(--active-bg);
        border-color: var(--active-border);
        color: var(--active-text);
      }

      .error {
        color: var(--error);
        font-size: 0.8rem;
        margin: 0;
        min-height: 1.2em;
      }

      /* ── Size rows ──────────────────────────────────────────────────────── */
      .sizes {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .size-row {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px 24px;
        background: var(--inset);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .size-label {
        font-size: 0.7rem;
        font-family: monospace;
        color: var(--text-muted);
        width: 28px;
        flex-shrink: 0;
      }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div class="card">

      <!-- Microphone controls sit above the visualizers -->
      <div class="controls">
        <select id="device-select">
          <option value="">Default microphone</option>
        </select>

        <div class="btn-row">
          <button id="btn-start">▶ Start microphone</button>
          <button id="btn-stop" disabled>⏹ Stop</button>
        </div>

        <p id="error-msg" class="error"></p>
      </div>

      <!-- All sizes share the same mic stream, each with its own colour -->
      <div class="sizes">
        <div class="size-row">
          <span class="size-label">icon</span>
          <audio-visualizer id="viz-icon" size="icon" color="#6366f1"></audio-visualizer>
        </div>
        <div class="size-row">
          <span class="size-label">sm</span>
          <audio-visualizer id="viz-sm" size="sm" color="#ec4899"></audio-visualizer>
        </div>
        <div class="size-row">
          <span class="size-label">md</span>
          <audio-visualizer id="viz-md" size="md" color="#10b981"></audio-visualizer>
        </div>
        <div class="size-row">
          <span class="size-label">lg</span>
          <audio-visualizer id="viz-lg" size="lg" color="#f59e0b"></audio-visualizer>
        </div>
        <div class="size-row">
          <span class="size-label">xl</span>
          <audio-visualizer id="viz-xl" size="xl" color="#06b6d4"></audio-visualizer>
        </div>
      </div>

    </div>

    <script type="module">
      const ALL_VIZ = ['viz-icon', 'viz-sm', 'viz-md', 'viz-lg', 'viz-xl'];

      const btnStart  = document.getElementById('btn-start');
      const btnStop   = document.getElementById('btn-stop');
      const deviceSel = document.getElementById('device-select');
      const errorMsg  = document.getElementById('error-msg');

      // ── Device enumeration ──────────────────────────────────────────────────

      async function populateDevices() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const mics = devices.filter(d => d.kind === 'audioinput');
        const current = deviceSel.value;

        deviceSel.innerHTML = '<option value="">Default microphone</option>';
        mics.forEach((mic, i) => {
          const opt = document.createElement('option');
          opt.value = mic.deviceId;
          opt.textContent = mic.label || `Microphone ${i + 1}`;
          deviceSel.appendChild(opt);
        });

        if (current && [...deviceSel.options].some(o => o.value === current)) {
          deviceSel.value = current;
        }
      }

      if (navigator.mediaDevices?.enumerateDevices) {
        populateDevices();
        navigator.mediaDevices.addEventListener('devicechange', populateDevices);
      }

      // ── Start / stop ────────────────────────────────────────────────────────

      async function startAll(deviceId) {
        for (const id of ALL_VIZ) {
          await document.getElementById(id)?.startMicrophone(deviceId || undefined);
        }
      }

      btnStart.addEventListener('click', async () => {
        btnStart.disabled = true;
        btnStart.textContent = '⏳ Requesting…';
        errorMsg.textContent = '';

        try {
          await startAll(deviceSel.value);
          await populateDevices();
          btnStart.textContent = '🎙 Mic active';
          btnStart.classList.add('active');
          btnStop.disabled = false;
        } catch (err) {
          btnStart.disabled = false;
          btnStart.textContent = '▶ Start microphone';
          btnStart.classList.remove('active');
          errorMsg.textContent = err?.message ?? 'Could not access microphone.';
        }
      });

      btnStop.addEventListener('click', () => {
        ALL_VIZ.forEach(id => document.getElementById(id)?.stopMicrophone());
        btnStart.disabled = false;
        btnStart.textContent = '▶ Start microphone';
        btnStart.classList.remove('active');
        btnStop.disabled = true;
      });

      // Switch device while active
      deviceSel.addEventListener('change', () => {
        if (btnStart.classList.contains('active')) startAll(deviceSel.value);
      });
    </script>
  </body>
</html>
